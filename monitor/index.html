<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0c10;--bg-card:#12151c;--bg-card-hover:#181c26;--border:#1e2332;--border-accent:#2a3148;--text:#e2e4ea;--text-dim:#6b7280;--text-muted:#3d4555;--accent:#3b82f6;--accent-glow:rgba(59,130,246,0.15);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--orange:#f59e0b;--cyan:#06b6d4;--purple:#a855f7;--radius:10px;--font-mono:'JetBrains Mono',monospace;--font-sans:'Outfit',sans-serif}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;position:relative}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 10% 10%,rgba(6,182,212,.07),transparent),radial-gradient(ellipse 500px 500px at 90% 20%,rgba(59,130,246,.06),transparent),radial-gradient(ellipse 400px 300px at 50% 80%,rgba(168,85,247,.05),transparent),radial-gradient(ellipse 600px 400px at 80% 90%,rgba(34,197,94,.04),transparent);z-index:0}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:60px 60px;z-index:0}
  .container{max-width:1200px;margin:0 auto;padding:24px 20px 48px;position:relative;z-index:1}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo-icon{width:40px;height:40px;flex-shrink:0}
  .logo-icon svg{width:100%;height:100%}
  .header h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
  .header h1 span{color:var(--text-dim);font-weight:400;margin-left:6px;font-size:14px}
  .header-right{display:flex;align-items:center;gap:12px}
  .status-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;font-family:var(--font-mono)}
  .status-badge.online{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
  .status-badge.offline{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
  .status-badge.offline .status-dot{animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .refresh-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
  .btn-refresh{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:all .15s}
  .btn-refresh:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
  .btn-refresh:active{transform:scale(.97)}
  .btn-refresh svg{width:14px;height:14px}
  .btn-refresh.spinning svg{animation:spin .6s linear}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .timer-text{color:var(--text-muted)}
  .timer-text b{color:var(--text-dim)}

  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .view-switcher{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:3px}
  .view-btn{padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--text-dim);font-family:var(--font-sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .view-btn:hover{color:var(--text)}
  .view-btn.active{background:var(--border-accent);color:var(--text)}

  .metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
  .metric-card{background:rgba(18,21,28,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color .2s,background .2s}
  .metric-card:hover{background:rgba(24,28,38,.8);border-color:var(--border-accent)}
  .metric-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:500;margin-bottom:8px}
  .metric-value{font-family:var(--font-mono);font-size:28px;font-weight:600;letter-spacing:-1px;line-height:1.1}
  .metric-sub{font-size:12px;color:var(--text-dim);margin-top:6px;font-family:var(--font-mono)}
  .bar-track{width:100%;height:5px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .6s ease,background .3s}
  .bar-fill.low{background:var(--green)}.bar-fill.mid{background:var(--orange)}.bar-fill.high{background:var(--red)}

  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);font-weight:600;padding-left:2px}

  .profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:32px}
  .profiles-grid.view-compact{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .profiles-grid.view-minimal{grid-template-columns:1fr;gap:6px}

  .profile-card{background:rgba(18,21,28,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
  .profile-card:hover{background:rgba(24,28,38,.8);border-color:var(--border-accent)}
  .profile-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
  .profile-card.has-conns::before{background:var(--green)}
  .profile-card.no-conns::before{background:var(--text-muted)}

  .profiles-grid.view-compact .profile-card{padding:14px 16px}
  .profiles-grid.view-compact .profile-stats-extra{display:none}
  .profiles-grid.view-compact .stat-block{padding:6px 10px}
  .profiles-grid.view-compact .stat-block .value{font-size:14px}
  .profiles-grid.view-compact .stat-block .label{font-size:9px}

  .profiles-grid.view-minimal .profile-card{padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .profiles-grid.view-minimal .profile-header{margin-bottom:0;flex:1;min-width:150px}
  .profiles-grid.view-minimal .profile-stats,
  .profiles-grid.view-minimal .profile-stats-extra{display:none}
  .profiles-grid.view-minimal .clients-list{border-top:none;padding-top:0;margin-top:0}
  .profiles-grid.view-minimal .clients-title{display:none}
  .profiles-grid.view-minimal .country-group{display:inline-flex;align-items:center;margin-right:4px}
  .profiles-grid.view-minimal .country-header{padding:3px 8px;font-size:12px;gap:4px;border-radius:4px;background:rgba(255,255,255,.03)}
  .profiles-grid.view-minimal .country-ips{display:none}
  .profiles-grid.view-minimal .country-chevron{display:none}
  .mini-stats{display:flex;gap:12px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
  .mini-stats span{white-space:nowrap}
  .mini-stats .rx{color:var(--cyan)}
  .mini-stats .tx{color:var(--purple)}
  .profiles-grid:not(.view-minimal) .mini-stats{display:none}

  .profile-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .profile-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
  .profile-port{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);background:var(--border);padding:2px 8px;border-radius:4px}
  .conn-badge{font-family:var(--font-mono);font-size:13px;font-weight:600;padding:4px 10px;border-radius:6px}
  .conn-badge.active{background:var(--green-dim);color:var(--green)}
  .conn-badge.idle{background:var(--border);color:var(--text-dim)}

  .profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .profile-stats-extra{margin-top:8px}
  .stat-block{padding:10px 12px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid var(--border)}
  .stat-block .label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:4px}
  .stat-block .value{font-family:var(--font-mono);font-size:16px;font-weight:600}
  .stat-block .value.rx{color:var(--cyan)}
  .stat-block .value.tx{color:var(--purple)}

  .clients-list{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
  .clients-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:6px}
  .country-group{margin-bottom:2px}
  .country-header{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .15s;user-select:none;font-size:13px}
  .country-header:hover{background:rgba(255,255,255,.04)}
  .country-flag{font-size:16px;line-height:1}
  .country-name{font-weight:500;color:var(--text);flex:1}
  .country-count{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--border);padding:1px 7px;border-radius:4px}
  .country-chevron{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid var(--text-muted);transition:transform .2s}
  .country-group.open .country-chevron{transform:rotate(90deg)}
  .country-ips{max-height:0;overflow:hidden;transition:max-height .25s ease;padding-left:34px}
  .country-group.open .country-ips{max-height:500px}
  .client-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
  .client-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
  .client-ip{color:var(--text)}

  .footer{text-align:center;font-size:11px;color:var(--text-muted);padding-top:20px;border-top:1px solid var(--border);font-family:var(--font-mono)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .error-banner{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:13px;font-family:var(--font-mono);display:none}

  @media(max-width:640px){
    .container{padding:16px 12px 32px}
    .header{flex-direction:column;align-items:flex-start}
    .metrics-row{grid-template-columns:1fr 1fr}
    .profiles-grid,.profiles-grid.view-compact{grid-template-columns:1fr}
    .metric-value{font-size:22px}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .35s ease-out both}
</style>
</head>
<body>
<div class="container">

  <div class="header fade-in">

814-3.473-5.751C396.27,231.91,395.741,230.955,395.271,229.982z M492.014,294.869c-2.935,27.836-24.235,52.053-51.797,58.88c-5.265,1.297-10.624,1.971-15.923,1.98c-3.285,0.009-6.767,0.299-10.428,0.751c-0.819,0.094-1.69,0.068-2.5,0.179c-5.316-5.06-9.847-11.042-13.329-17.613c2.782-3.627,5.299-7.45,7.467-11.477c0.017-0.026,0.026-0.043,0.034-0.068c1.408-2.62,2.637-5.342,3.763-8.107c0.154-0.367,0.299-0.725,0.444-1.092c1.263-3.226,2.355-6.519,3.217-9.907c0.111-0.435,0.196-0.879,0.299-1.314c0.819-3.447,1.485-6.946,1.86-10.53c0.273-2.569,0.427-5.137,0.469-7.706c0.009-0.401-0.034-0.811-0.034-1.212c0-0.828-0.051-1.647-0.077-2.466c-0.06-2.227-0.196-4.429-0.427-6.63c-0.085-0.836-0.179-1.673-0.299-2.509c-0.324-2.406-0.751-4.787-1.28-7.151c-0.111-0.521-0.205-1.05-0.324-1.57c-0.725-2.987-1.596-5.948-2.637-8.841c16.905-16.606,42.129-23.407,65.092-17.357c1.459,2.705,2.953,5.154,4.531,7.416C489.667,262.144,493.78,278.17,492.014,294.869z"/></svg></div>
      <h1>SOCKS5 Monitor <span>by distillium</span></h1>
    </div>
    <div class="header-right">
      <div class="status-badge offline" id="daemonStatus">
        <div class="status-dot"></div>
        <span>LOADING</span>
      </div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="refresh-bar fade-in">
    <button class="btn-refresh" id="btnRefresh" onclick="manualRefresh()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Обновить
    </button>
    <span class="timer-text">Обновлено <b id="lastUpdate">—</b> · следующее через <b id="countdown">60</b>с</span>
  </div>

  <div class="metrics-row fade-in" style="animation-delay:.05s">
    <div class="metric-card">
      <div class="metric-label">CPU</div>
      <div class="metric-value" id="cpuVal">—</div>
      <div class="metric-sub" id="cpuLoad"></div>
      <div class="bar-track"><div class="bar-fill low" id="cpuBar" style="width:0%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">RAM</div>
      <div class="metric-value" id="ramVal">—</div>
      <div class="metric-sub" id="ramSub"></div>
      <div class="bar-track"><div class="bar-fill low" id="ramBar" style="width:0%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Disk</div>
      <div class="metric-value" id="diskVal">—</div>
      <div class="metric-sub" id="diskSub"></div>
      <div class="bar-track"><div class="bar-fill low" id="diskBar" style="width:0%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Connections</div>
      <div class="metric-value" id="totalConns">—</div>
      <div class="metric-sub" id="uptimeSub"></div>
    </div>
  </div>

  <div class="toolbar fade-in" style="animation-delay:.1s">
    <div class="section-title">Profiles</div>
    <div class="view-switcher">
      <button class="view-btn active" data-view="full" onclick="setView('full')">Полный</button>
      <button class="view-btn" data-view="compact" onclick="setView('compact')">Компактный</button>
      <button class="view-btn" data-view="minimal" onclick="setView('minimal')">Мини</button>
    </div>
  </div>

  <div class="profiles-grid" id="profilesGrid">
    <div class="empty-state"><div>Загрузка...</div></div>
  </div>

  <div class="footer fade-in" style="animation-delay:.15s">socks5-monitor</div>
</div>

<script>
const API='/api/stats',REFRESH=60;
let secondsLeft=REFRESH,refreshTimer=null,currentView=localStorage.getItem('s5m-view')||'full',lastData=null;

function fmt(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB'}
function barClass(p){return p<60?'low':p<85?'mid':'high'}
function setBar(id,p){const e=document.getElementById(id);e.style.width=p+'%';e.className='bar-fill '+barClass(p)}
function countryFlag(c){if(!c||c==='XX')return'\u{1F30D}';return String.fromCodePoint(...[...c.toUpperCase()].map(x=>0x1F1E6+x.charCodeAt(0)-65))}

const openGroups=new Set();
function toggleCountry(k){openGroups.has(k)?openGroups.delete(k):openGroups.add(k);const e=document.getElementById(k);if(e)e.classList.toggle('open')}

function setView(v){
  currentView=v;
  localStorage.setItem('s5m-view',v);
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  const g=document.getElementById('profilesGrid');
  g.className='profiles-grid'+(v!=='full'?' view-'+v:'');
  if(lastData)renderProfiles(lastData);
}

function renderProfiles(profiles){
  lastData=profiles;
  const grid=document.getElementById('profilesGrid');
  if(!profiles||!profiles.length){grid.innerHTML='<div class="empty-state">Нет активных профилей</div>';return}

  grid.innerHTML=profiles.map((p,i)=>{
    const hasC=p.connections>0,cc=hasC?'active':'idle',cardC=hasC?'has-conns':'no-conns';
    const byC={};
    for(const c of(p.clients||[])){const k=c.countryCode||'XX';if(!byC[k])byC[k]={country:c.country||'Unknown',code:k,ips:new Set()};byC[k].ips.add(c.remote_ip)}
    const sorted=Object.values(byC).sort((a,b)=>b.ips.size-a.ips.size);
    const totalIps=new Set((p.clients||[]).map(c=>c.remote_ip)).size;

    // Full/compact clients
    let clientsHtml='';
    if(p.clients&&p.clients.length>0){
      const rows=sorted.map(g=>{
        const gk=`geo-${p.port}-${g.code}`,isO=openGroups.has(gk);
        const ips=[...g.ips].map(ip=>`<div class="client-row"><div class="client-dot"></div><span class="client-ip">${ip}</span></div>`).join('');
        return`<div class="country-group ${isO?'open':''}" id="${gk}"><div class="country-header" onclick="toggleCountry('${gk}')"><span class="country-flag">${countryFlag(g.code)}</span><span class="country-name">${g.country}</span><span class="country-count">${g.ips.size}</span><span class="country-chevron"></span></div><div class="country-ips">${ips}</div></div>`
      }).join('');
      clientsHtml=`<div class="clients-list"><div class="clients-title">Подключённые клиенты (${totalIps} IP)</div>${rows}</div>`;
    }

    // Mini countries (inline)
    let miniC='';
    if(sorted.length>0){
      miniC=`<div class="clients-list">${sorted.map(g=>`<div class="country-group"><div class="country-header"><span class="country-flag">${countryFlag(g.code)}</span><span class="country-name">${g.country}</span><span class="country-count">${g.ips.size}</span></div></div>`).join('')}</div>`;
    }

    const pkts=p.total_packets||0;
    const fP=pkts>=1e6?(pkts/1e6).toFixed(1)+'M':pkts>=1e3?(pkts/1e3).toFixed(1)+'K':pkts;

    if(currentView==='minimal'){
      return`<div class="profile-card ${cardC}"><div class="profile-header"><div class="profile-name">${p.name}<span class="profile-port">:${p.port}</span></div><div class="conn-badge ${cc}">${p.connections}</div></div><div class="mini-stats"><span class="rx">\u2193 ${fmt(p.rx_bytes)}</span><span class="tx">\u2191 ${fmt(p.tx_bytes)}</span></div>${miniC}</div>`;
    }

    return`<div class="profile-card ${cardC} fade-in" style="animation-delay:${0.03*i}s">
      <div class="profile-header"><div class="profile-name">${p.name}<span class="profile-port">:${p.port}</span></div><div class="conn-badge ${cc}">${p.connections} conn</div></div>
      <div class="profile-stats"><div class="stat-block"><div class="label">\u2193 Входящий</div><div class="value rx">${fmt(p.rx_bytes)}</div></div><div class="stat-block"><div class="label">\u2191 Исходящий</div><div class="value tx">${fmt(p.tx_bytes)}</div></div></div>
      <div class="profile-stats profile-stats-extra"><div class="stat-block"><div class="label">Всего пакетов</div><div class="value" style="color:var(--orange)">${fP}</div></div><div class="stat-block"><div class="label">Суммарный трафик</div><div class="value" style="color:var(--text)">${fmt(p.rx_bytes+p.tx_bytes)}</div></div></div>
      ${clientsHtml}</div>`;
  }).join('');
}

async function refresh(){
  const banner=document.getElementById('errorBanner'),btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  try{
    const res=await fetch(API);if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=await res.json();banner.style.display='none';
    const st=document.getElementById('daemonStatus');
    if(d.server.dante_active){st.className='status-badge online';st.querySelector('span').textContent='DANTE ACTIVE'}
    else{st.className='status-badge offline';st.querySelector('span').textContent='DANTE STOPPED'}
    document.getElementById('cpuVal').textContent=d.server.cpu_percent.toFixed(1)+'%';
    document.getElementById('cpuLoad').textContent=`Load: ${d.server.load['1m']} / ${d.server.load['5m']} / ${d.server.load['15m']}`;
    setBar('cpuBar',d.server.cpu_percent);
    const m=d.server.memory;document.getElementById('ramVal').textContent=m.percent.toFixed(1)+'%';
    document.getElementById('ramSub').textContent=`${m.used_mb.toFixed(0)} / ${m.total_mb.toFixed(0)} MB`;setBar('ramBar',m.percent);
    const dk=d.server.disk;document.getElementById('diskVal').textContent=dk.percent.toFixed(1)+'%';
    document.getElementById('diskSub').textContent=`${dk.used_gb} / ${dk.total_gb} GB`;setBar('diskBar',dk.percent);
    document.getElementById('totalConns').textContent=d.total_connections;
    document.getElementById('uptimeSub').textContent='Uptime: '+d.server.uptime;
    renderProfiles(d.profiles);
    document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){banner.textContent='Не удалось загрузить данные: '+e.message;banner.style.display='block'}
  setTimeout(()=>btn.classList.remove('spinning'),600);
  secondsLeft=REFRESH;
}

function manualRefresh(){secondsLeft=REFRESH;refresh()}

function startCountdown(){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{secondsLeft--;document.getElementById('countdown').textContent=Math.max(0,secondsLeft);if(secondsLeft<=0)refresh()},1000);
}

setView(currentView);refresh();startCountdown();
</script>
</body>
</html>
